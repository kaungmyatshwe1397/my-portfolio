name: Deploy Marp Slides to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create build directory
        run: mkdir build

      - name: Convert Presentation
        run: npx @marp-team/marp-cli@latest ./slides/presentationMarp.md -o build/index.html

      - name: Convert Tech Stack
        run: npx @marp-team/marp-cli@latest ./slides/tech-stack.md -o build/tech-stack.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build
          branch: gh-pages
